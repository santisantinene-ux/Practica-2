# ==============================================================
# Configuracion de la aplicacion
# ==============================================================
spring.application.name=tiendaapp
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (solo en dev)
spring.thymeleaf.cache=false

# ==============================================================
# Conexion a MySQL
# ==============================================================
# Los valores sensibles vienen de variables de entorno con default
# para que la app arranque incluso si las variables no estan definidas.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tiendadb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:cambiame_local}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / Hibernate
# ==============================================================
# Hibernate crea o actualiza las tablas segun las @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Ver el SQL generado en la consola (util en clase, NO en produccion)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# Logs
# ==============================================================
logging.level.root=INFO
logging.level.com.ufide.tiendaapp=DEBUG
